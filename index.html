<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="transparent" />
    <meta name="color-scheme" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Ccat OS" />
    <meta name="apple-mobile-web-app-title" content="Ccat OS" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/ai-roleplay-phone/manifest.json" />
    <title>Prototype</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background-color: #b7daf2;
        background-image: url("/ai-roleplay-phone/worldbook-assets/hero-worldbook.png?v=0.2.30");
        background-position: top center;
        background-repeat: no-repeat;
        background-size: cover;
      }
    </style>
    <script>
      (() => {
        const isStandalone = window.navigator.standalone || window.matchMedia?.("(display-mode: standalone)")?.matches;
        if (isStandalone) document.documentElement.classList.add("standalone-pwa");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
